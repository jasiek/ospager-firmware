; ospager - open-hardware POCSAG pager (LilyGo T-Beam v1.1)
; ESP32 + SX1278 (433 MHz LoRa/FSK transceiver) + AXP192 power management

[env:tbeam]
platform = espressif32@^6.9.0
board = ttgo-t-beam
framework = arduino

; No monitor_filters: the UI is a full-screen ANSI TUI, and line-oriented
; filters (timestamps, exception decoder) inject text / buffer on newlines and
; corrupt cursor positioning.
monitor_speed = 115200
monitor_raw = yes

lib_deps =
    jgromes/RadioLib@^7.1
    lewisxhe/XPowersLib@^0.2.7
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11

build_flags =
    -D CORE_DEBUG_LEVEL=0
